<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowForge | Algorithm Builder</title>

    <!-- External CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/jquery-contextmenu/2.9.2/jquery.contextMenu.min.css"
    />
    <link rel="stylesheet" href="css/builder.css" />

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' fill='white'/%3E%3Cpath fill='%233b82f6' d='M6 2h12v4H6V2zm0 6h12v4H6V8zm0 6h12v4H6v-4zM2 4h2v16H2V4zm18 0h2v16h-2V4z'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <nav class="navbar navbar-light bg-white shadow-sm px-4 py-2">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
          <i class="fas fa-project-diagram text-primary me-2"></i>FlowForge ·
          Algorithm Builder
          <small class="text-muted ms-2" id="algorithmName"></small>
        </span>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-primary btn-sm" id="saveAndCloseBtn">
            <i class="fas fa-save"></i> Save & Close
          </button>
          <button class="btn btn-outline-success btn-sm" id="saveBtn">
            <i class="fas fa-save"></i> Save
          </button>
          <button class="btn btn-outline-danger btn-sm" id="resetBtn">
            <i class="fas fa-trash-alt"></i> Reset All
          </button>
        </div>
      </div>
    </nav>

    <div class="toolbar-buttons">
      <button class="btn btn-outline-primary add-item-btn" data-type="text">
        <i class="fas fa-font"></i> Text
      </button>
      <button class="btn btn-outline-primary add-item-btn" data-type="number">
        <i class="fas fa-hashtag"></i> Number
      </button>
      <button class="btn btn-outline-primary add-item-btn" data-type="select">
        <i class="fas fa-check-circle"></i> Select
      </button>
      <button
        class="btn btn-outline-primary add-item-btn"
        data-type="multiSelect"
      >
        <i class="fas fa-check-double"></i> Multi Select
      </button>
      <button class="btn btn-outline-primary add-item-btn" data-type="list">
        <i class="fas fa-list"></i> List
      </button>
      <button class="btn btn-outline-primary add-item-btn" data-type="date">
        <i class="fas fa-calendar"></i> Date
      </button>
      <button class="btn btn-outline-primary add-item-btn" data-type="time">
        <i class="fas fa-clock"></i> Time
      </button>
    </div>

    <div class="builder-container">
      <div class="canvas-wrap">
        <div class="canvas-scroll-area">
          <div class="questions" id="canvas-questions"></div>
        </div>
      </div>
      <div class="property-panel" id="propertyPanel">
        <h5><i class="fas fa-sliders-h me-2"></i>Node Inspector</h5>
        <div id="dynamicProperties">
          <div class="text-muted text-center mt-5">
            <i class="fas fa-mouse-pointer fa-2x mb-2"></i><br />Click any node
            to edit or right-click for options
          </div>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Delete Node</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            Are you sure you want to delete this node? All connections will be
            removed.
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
            <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Reset Confirmation Modal -->
    <div class="modal fade" id="resetModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Clear All Nodes?</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            Are you sure you want to clear all nodes? This action cannot be
            undone.
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
            <button class="btn btn-danger" id="confirmResetBtn">
              Yes, I'm sure
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsPlumb/2.15.6/js/jsplumb.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-contextmenu/2.9.2/jquery.contextMenu.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-contextmenu/2.9.2/jquery.ui.position.js"></script>
    <script src="js/utils/algorithm-manager.js"></script>
    <script src="js/utils/toast-manager.js"></script>
    <script src="js/builder.js"></script>
  </body>
</html>
