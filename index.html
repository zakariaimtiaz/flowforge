<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithm Management | FlowForge</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="css/index.css" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' fill='white'/%3E%3Cpath fill='%233b82f6' d='M6 2h12v4H6V2zm0 6h12v4H6V8zm0 6h12v4H6v-4zM2 4h2v16H2V4zm18 0h2v16h-2V4z'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <nav class="navbar navbar-light bg-white shadow-sm px-4 py-2">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
          <i class="fas fa-project-diagram text-primary me-2"></i>FlowForge ·
          Algorithm Management
        </span>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-primary btn-sm" id="createNewBtn">
            <i class="fas fa-plus-circle me-2"></i> Create New Algorithm
          </button>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
              <h5 class="mb-0">
                <i class="fas fa-list me-2"></i>My Algorithms
              </h5>
            </div>
            <div class="card-body">
              <div class="table-responsive">
                <table
                  class="table table-hover align-middle"
                  id="algorithmTable"
                >
                  <thead class="table-light">
                    <tr>
                      <th style="width: 5%">#</th>
                      <th style="width: 25%">Algorithm Name</th>
                      <th style="width: 15%">Type</th>
                      <th style="width: 20%">Last Modified</th>
                      <th style="width: 20%">Created</th>
                      <th style="width: 15%">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="algorithmList">
                    <!-- Algorithms will be loaded here -->
                  </tbody>
                </table>
              </div>

              <!-- Empty state -->
              <div id="emptyState" class="text-center py-5 d-none">
                <i class="fas fa-diagram-project fa-4x text-muted mb-3"></i>
                <h5 class="text-muted">No algorithms yet</h5>
                <p class="text-muted">
                  Create your first algorithm to get started
                </p>
                <button class="btn btn-primary" id="emptyCreateBtn">
                  <i class="fas fa-plus-circle me-2"></i>Create Algorithm
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Delete Algorithm</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            Are you sure you want to delete "<span
              id="deleteAlgorithmName"
            ></span
            >"? <br /><br />
            <strong class="text-danger">This action cannot be undone!</strong>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
            <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils/algorithm-manager.js"></script>
    <script src="js/utils/toast-manager.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
