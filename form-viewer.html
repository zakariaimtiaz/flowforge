<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowForge | Dynamic Form Generator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="css/form-viewer.css" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' fill='white'/%3E%3Cpath fill='%233b82f6' d='M6 2h12v4H6V2zm0 6h12v4H6V8zm0 6h12v4H6v-4zM2 4h2v16H2V4zm18 0h2v16h-2V4z'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div class="container mt-4">
      <div class="row">
        <div class="col-lg-8 mx-auto">
          <!-- Form Preview Card -->
          <div class="card shadow-sm" id="formPreviewCard">
            <div class="card-header bg-white py-3">
              <h5 class="mb-0">
                <i class="fas fa-eye text-primary me-2"></i>
                <span id="formTitle">Form Preview</span>
              </h5>
              <small class="text-muted" id="formDescription"></small>
            </div>
            <div class="card-body" id="formContainer">
              <div class="text-center py-5 text-muted">
                <i class="fas fa-folder-open fa-4x mb-3"></i>
              </div>
            </div>
            <div
              class="card-footer bg-white"
              id="formFooter"
              style="display: none"
            >
              <div class="d-flex justify-content-between align-items-center">
                <button class="btn btn-secondary" id="prevBtn" disabled>
                  <i class="fas fa-arrow-left me-1"></i> Previous
                </button>
                <span id="progressIndicator" class="text-muted"></span>
                <button class="btn btn-primary" id="nextBtn">
                  Next <i class="fas fa-arrow-right ms-1"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- Response Preview -->
          <div
            class="card shadow-sm mt-4"
            id="responseCard"
            style="display: none"
          >
            <div class="card-header bg-success text-white">
              <h6 class="mb-0">
                <i class="fas fa-check-circle me-2"></i>Form Responses
              </h6>
            </div>
            <div class="card-body" id="responseContainer">
              <pre
                id="responseJson"
                style="
                  background: #f8f9fa;
                  padding: 15px;
                  border-radius: 8px;
                  font-size: 12px;
                "
              ></pre>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils/algorithm-manager.js"></script>
    <script src="js/utils/toast-manager.js"></script>
    <script src="js/form-viewer.js"></script>
  </body>
</html>
