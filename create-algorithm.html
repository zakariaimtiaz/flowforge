<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algorithm Form | FlowForge</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="css/create-algorithm.css" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' fill='white'/%3E%3Cpath fill='%233b82f6' d='M6 2h12v4H6V2zm0 6h12v4H6V8zm0 6h12v4H6v-4zM2 4h2v16H2V4zm18 0h2v16h-2V4z'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <nav class="navbar navbar-light bg-white shadow-sm px-4 py-2">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
          <i class="fas fa-project-diagram text-primary me-2"></i>FlowForge ·
          <span class="navbar-brand mb-0 h1" id="pageTitle">
            <i class="fas fa-plus-circle text-success me-2"></i>Algorithm Form
          </span>
        </span>
        <div class="d-flex gap-2">
          <a href="index.html" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-2"></i>Back to List
          </a>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow-sm">
            <div class="card-body p-5">
              <form id="algorithmForm">
                <input type="hidden" id="algorithmId" />

                <div class="mb-4">
                  <label for="algorithmName" class="form-label fw-bold"
                    >Algorithm Name <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control form-control-lg"
                    id="algorithmName"
                    required
                    placeholder="Enter algorithm name"
                  />
                  <div class="form-text">
                    Give your algorithm a descriptive name
                  </div>
                </div>

                <div class="mb-4">
                  <label for="algorithmType" class="form-label fw-bold"
                    >Algorithm Type <span class="text-danger">*</span></label
                  >
                  <select
                    class="form-select form-select-lg"
                    id="algorithmType"
                    required
                  >
                    <option value="">Select type</option>
                    <option value="diagnostic">Diagnostic</option>
                    <option value="treatment">Treatment</option>
                    <option value="scheduling">Scheduling</option>
                    <option value="assessment">Assessment</option>
                    <option value="custom">Custom</option>
                  </select>
                </div>

                <div class="mb-4">
                  <label for="algorithmDescription" class="form-label fw-bold"
                    >Description</label
                  >
                  <textarea
                    class="form-control"
                    id="algorithmDescription"
                    rows="4"
                    placeholder="Describe what this algorithm does..."
                  ></textarea>
                  <div class="form-text">
                    Optional: Add a description for reference
                  </div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                  <a href="index.html" class="btn btn-secondary btn-lg px-4"
                    >Cancel</a
                  >
                  <button
                    type="submit"
                    class="btn btn-primary btn-lg px-4"
                    id="submitBtn"
                  >
                    <i class="fas fa-check-circle me-2"></i>Create
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils/algorithm-manager.js"></script>
    <script src="js/utils/toast-manager.js"></script>
    <script src="js/create-algorithm.js"></script>
  </body>
</html>
